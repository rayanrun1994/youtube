name: YouTube Serverless Backend

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        type: string
      quality:
        description: 'Quality (e.g. 1080, mp3)'
        required: true
        type: string
      webhookId:
        description: 'ID for tracking'
        required: true
        type: string
      webhookUrl:
        description: 'Callback URL'
        required: true
        type: string
      cookies:
        description: 'YouTube Netscape Cookies'
        required: false
        type: string
        default: ''
      platform:
        description: 'Assigned platform to upload to'
        required: true
        type: string
        default: 'tmpfiles'

permissions:
  contents: write
  statuses: write

jobs:
  download_and_merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies (yt-dlp & ffmpeg)
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update -y
          sudo -E apt-get install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" ffmpeg curl python3 jq
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Create Cookies File
        env:
          COOKIES_DATA: ${{ github.event.inputs.cookies }}
        run: |
          if [ -n "$COOKIES_DATA" ]; then
            printf "%s" "$COOKIES_DATA" > cookies.txt
            echo "USE_COOKIES=--cookies cookies.txt" >> $GITHUB_ENV
          else
            echo "USE_COOKIES=" >> $GITHUB_ENV
          fi

      - name: Download & Process Video
        run: |
          URL="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          # Initialize error file and set default status code to failure
          echo "" > error_log.txt
          STATUS_CODE=1
          
          # أولاً: إذا كانت الكوكيز متوفرة، نمنحها الأولوية القصوى والاعتماد الكامل عليها
          if [ -n "$USE_COOKIES" ]; then
            echo "==== البدء باستخدام الكوكيز الموفرة من إعدادات المطور ===="
            
            # المحاولة الأولى: الكوكيز مع العميل الافتراضي (وهو الأنسب لكوكي المتصفح)
            echo "==== المحاولة 1: الكوكيز + العميل الافتراضي ===="
            if [ "$QUALITY" == "mp3" ]; then
              yt-dlp $USE_COOKIES --js-runtimes node -x --audio-format mp3 "$URL" -o "output.%(ext)s" 2> error_log.txt || STATUS_CODE=$?
            elif [ "$QUALITY" == "2160" ] || [ "$QUALITY" == "1440" ] || [ "$QUALITY" == "1085" ] || [ "$QUALITY" == "1080" ]; then
              yt-dlp $USE_COOKIES --js-runtimes node -f "bestvideo[height<=$QUALITY]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
            else
              yt-dlp $USE_COOKIES --js-runtimes node -f "bestvideo[height<=${QUALITY}]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
            fi
            
            if [ -f "output.mp3" ] || [ -f "output.mp4" ] || [ -f "output.webm" ] || [ -f "output.mkv" ]; then
              STATUS_CODE=0
              echo "✅ نجحت المحاولة بالكوكيز والعميل الافتراضي!"
            fi
            
            # المحاولة الثانية: الكوكيز مع محاكاة الهواتف (ios,android)
            if [ $STATUS_CODE -ne 0 ]; then
              echo "==== المحاولة 2: الكوكيز + محاكاة الهواتف (ios,android) ===="
              echo "" > error_log.txt
              if [ "$QUALITY" == "mp3" ]; then
                yt-dlp $USE_COOKIES --js-runtimes node --extractor-args "youtube:player-client=ios,android" -x --audio-format mp3 "$URL" -o "output.%(ext)s" 2> error_log.txt || STATUS_CODE=$?
              elif [ "$QUALITY" == "2160" ] || [ "$QUALITY" == "1440" ] || [ "$QUALITY" == "1080" ]; then
                yt-dlp $USE_COOKIES --js-runtimes node --extractor-args "youtube:player-client=ios,android" -f "bestvideo[height<=$QUALITY]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
              else
                yt-dlp $USE_COOKIES --js-runtimes node --extractor-args "youtube:player-client=ios,android" -f "bestvideo[height<=${QUALITY}]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
              fi
              
              if [ -f "output.mp3" ] || [ -f "output.mp4" ] || [ -f "output.webm" ] || [ -f "output.mkv" ]; then
                STATUS_CODE=0
                echo "✅ نجحت المحاولة بالكوكيز ومحاكاة الهواتف!"
              fi
            fi
            
            # المحاولة الثالثة: الكوكيز مع محاكاة شاشات التلفاز (tv_embedded)
            if [ $STATUS_CODE -ne 0 ]; then
              echo "==== المحاولة 3: الكوكيز + محاكاة شاشات التلفاز (tv_embedded) ===="
              echo "" > error_log.txt
              if [ "$QUALITY" == "mp3" ]; then
                yt-dlp $USE_COOKIES --js-runtimes node --extractor-args "youtube:player-client=tv_embedded" -x --audio-format mp3 "$URL" -o "output.%(ext)s" 2> error_log.txt || STATUS_CODE=$?
              elif [ "$QUALITY" == "2160" ] || [ "$QUALITY" == "1440" ] || [ "$QUALITY" == "1080" ]; then
                yt-dlp $USE_COOKIES --js-runtimes node --extractor-args "youtube:player-client=tv_embedded" -f "bestvideo[height<=$QUALITY]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
              else
                yt-dlp $USE_COOKIES --js-runtimes node --extractor-args "youtube:player-client=tv_embedded" -f "bestvideo[height<=${QUALITY}]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
              fi
              
              if [ -f "output.mp3" ] || [ -f "output.mp4" ] || [ -f "output.webm" ] || [ -f "output.mkv" ]; then
                STATUS_CODE=0
                echo "✅ نجحت المحاولة بالكوكيز ومحاكاة شاشات التلفاز!"
              fi
            fi
          fi
          
          # ثانياً: إذا لم تتوفر كوكيز، أو إذا فشلت جميع محاولات الكوكيز السابقة (انتهت صلاحيتها مثلاً)
          if [ $STATUS_CODE -ne 0 ]; then
            echo "==== البدء بالمحاولات البديلة بدون كوكيز ===="
            
            # المحاولة الرابعة: محاكاة الهواتف (ios,android) بدون كوكيز
            echo "==== المحاولة 4: محاكاة الهواتف بدون كوكيز (ios,android) ===="
            echo "" > error_log.txt
            if [ "$QUALITY" == "mp3" ]; then
              yt-dlp --js-runtimes node --extractor-args "youtube:player-client=ios,android" -x --audio-format mp3 "$URL" -o "output.%(ext)s" 2> error_log.txt || STATUS_CODE=$?
            elif [ "$QUALITY" == "2160" ] || [ "$QUALITY" == "1440" ] || [ "$QUALITY" == "1085" ] || [ "$QUALITY" == "1080" ]; then
              yt-dlp --js-runtimes node --extractor-args "youtube:player-client=ios,android" -f "bestvideo[height<=$QUALITY]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
            else
              yt-dlp --js-runtimes node --extractor-args "youtube:player-client=ios,android" -f "bestvideo[height<=${QUALITY}]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
            fi
            
            if [ -f "output.mp3" ] || [ -f "output.mp4" ] || [ -f "output.webm" ] || [ -f "output.mkv" ]; then
              STATUS_CODE=0
              echo "✅ نجحت المحاولة بمحاكاة الهواتف بدون كوكيز!"
            fi
            
            # المحاولة الخامسة: محاكاة شاشات التلفاز (tv_embedded) بدون كوكيز
            if [ $STATUS_CODE -ne 0 ]; then
              echo "==== المحاولة 5: محاكاة شاشات التلفاز بدون كوكيز (tv_embedded) ===="
              echo "" > error_log.txt
              if [ "$QUALITY" == "mp3" ]; then
                yt-dlp --js-runtimes node --extractor-args "youtube:player-client=tv_embedded" -x --audio-format mp3 "$URL" -o "output.%(ext)s" 2> error_log.txt || STATUS_CODE=$?
              elif [ "$QUALITY" == "2160" ] || [ "$QUALITY" == "1440" ] || [ "$QUALITY" == "1080" ]; then
                yt-dlp --js-runtimes node --extractor-args "youtube:player-client=tv_embedded" -f "bestvideo[height<=$QUALITY]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
              else
                yt-dlp --js-runtimes node --extractor-args "youtube:player-client=tv_embedded" -f "bestvideo[height<=${QUALITY}]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
              fi
              
              if [ -f "output.mp3" ] || [ -f "output.mp4" ] || [ -f "output.webm" ] || [ -f "output.mkv" ]; then
                STATUS_CODE=0
                echo "✅ نجحت المحاولة بمحاكاة شاشات التلفاز بدون كوكيز!"
              fi
            fi
            
            # المحاولة السادسة: التنزيل الافتراضي كبديل أخير بدون كوكيز أو محاكيات
            if [ $STATUS_CODE -ne 0 ]; then
              echo "==== المحاولة 6: التنزيل الافتراضي بدون كوكيز أو محاكيات ===="
              echo "" > error_log.txt
              if [ "$QUALITY" == "mp3" ]; then
                yt-dlp --js-runtimes node -x --audio-format mp3 "$URL" -o "output.%(ext)s" 2> error_log.txt || STATUS_CODE=$?
              elif [ "$QUALITY" == "2160" ] || [ "$QUALITY" == "1440" ] || [ "$QUALITY" == "1080" ]; then
                yt-dlp --js-runtimes node -f "bestvideo[height<=$QUALITY]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
              else
                yt-dlp --js-runtimes node -f "bestvideo[height<=${QUALITY}]+bestaudio/best" "$URL" -o "output.%(ext)s" --merge-output-format mp4 2> error_log.txt || STATUS_CODE=$?
              fi
              
              if [ -f "output.mp3" ] || [ -f "output.mp4" ] || [ -f "output.webm" ] || [ -f "output.mkv" ]; then
                STATUS_CODE=0
                echo "✅ نجحت المحاولة بالتحميل الافتراضي!"
              fi
            fi
          fi
          
          # تعيين الملف النهائي وتأكيد النجاح
          if [ -f "output.mp3" ]; then
            FILE="output.mp3"
            STATUS_CODE=0
          elif [ -f "output.mp4" ]; then
            FILE="output.mp4"
            STATUS_CODE=0
          else
            POTENTIAL_FILE=$(ls output.* 2>/dev/null | head -n 1)
            if [ -n "$POTENTIAL_FILE" ]; then
              FILE="$POTENTIAL_FILE"
              STATUS_CODE=0
            else
              STATUS_CODE=1
            fi
          fi
          
          if [ $STATUS_CODE -ne 0 ]; then
            echo "YT_ERROR<<EOF" >> $GITHUB_ENV
            cat error_log.txt | head -n 8 >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "JOB_OUT_STATUS=failure" >> $GITHUB_ENV
            exit 1
          fi

          # =========================================================
          # FFMPEG AUTO COMPRESSION & SIZE VALIDATION SYSTEM (2GB LIMIT)
          # =========================================================
          FILE_SIZE=$(wc -c < "$FILE")
          # 2GB in bytes = 2147483648 (we use 2000000000 bytes for extra safety headroom)
          LIMIT_SIZE=2000000000

          if [ $FILE_SIZE -gt $LIMIT_SIZE ]; then
            echo "⚠️ حجم الفيديو الحالي ($(expr $FILE_SIZE / 1048576) ميجابايت) أكبر من الحد المسموح به (2 جيجابايت)! يجري ضغط الفيديو بتفعيل مرمز H.264 السريع..."
            EXT="${FILE##*.}"
            COMPRESSED_FILE="compressed_video.$EXT"
            
            # ضغط سريع وممتاز بجودة crf 23 و preset superfast لحفظ وقت التنفيذ وضمان جودة فائقة للفيديو
            ffmpeg -y -i "$FILE" -c:v libx264 -crf 23 -preset superfast -c:a copy "$COMPRESSED_FILE" 2> ffmpeg_compression.log || true
            
            if [ -f "$COMPRESSED_FILE" ]; then
              NEW_SIZE=$(wc -c < "$COMPRESSED_FILE")
              echo "✅ نجحت عملية الضغط الفائقة! الحجم الجديد بعد الضغط: $(expr $NEW_SIZE / 1048576) ميجابايت."
              if [ $NEW_SIZE -le $LIMIT_SIZE ]; then
                mv "$COMPRESSED_FILE" "$FILE"
              else
                echo "❌ حجم الفيديو ($NEW_SIZE بايت) ما زال يتجاوز 2 جيجابايت بعد الضغط!"
                echo "YT_ERROR=عذراً، الفيديو طويل جداً وحجمه يتجاوز 2 جيجابايت حتى بعد الضغط التلقائي. من الأفضل عدم تجاوز مدة الفيديو ساعة ونصف إلى ساعتين لحفظ السعة واستقرار التنزيل." >> $GITHUB_ENV
                echo "JOB_OUT_STATUS=failure" >> $GITHUB_ENV
                exit 1
              fi
            else
              echo "❌ فشلت عملية الضغط التلقائية بجهاز FFmpeg!"
              cat ffmpeg_compression.log | tail -n 12
              
              if [ $FILE_SIZE -gt $LIMIT_SIZE ]; then
                echo "YT_ERROR=الفيديو يتجاوز 2 جيجابايت وفشلت عملية الضغط. يرجى اختيار فيديو أقصر." >> $GITHUB_ENV
                echo "JOB_OUT_STATUS=failure" >> $GITHUB_ENV
                exit 1
              fi
            fi
          fi

          # =========================================================
          # DIRECT GITHUB RELEASES SECURE UPLOAD
          # =========================================================
          WEBHOOK_ID="${{ github.event.inputs.webhookId }}"
          EXT="${FILE##*.}"

          # الحصول على اسم الفيديو الأصلي بصيغة نظيفة ومتوافقة
          RAW_TITLE=$(yt-dlp --get-title "$URL" 2>/dev/null | head -n 1)
          if [ -z "$RAW_TITLE" ]; then
            RAW_TITLE="video"
          fi

          # إزالة الحروف غير المتوافقة مع أسماء الملفات وجعلها ملائمة وحفظ اللغات العربية والإنجليزية
          CLEAN_TITLE=$(echo "$RAW_TITLE" | sed 's/[/\?*|<>":#%]//g' | tr ' ' '_')
          # تقليص الاسم لتفادي أي مشاكل في طول المسار
          CLEAN_TITLE=$(echo "$CLEAN_TITLE" | cut -c1-120)

          FINAL_NAME="${CLEAN_TITLE}_${WEBHOOK_ID}.${EXT}"
          mv "$FILE" "$FINAL_NAME"
          FILE="$FINAL_NAME"

          echo "==== جاري رفع واجهة الوسائط ومخرجات الفيديو إلى GitHub Releases ===="
          echo "اسم الملف المرفوع: $FILE"

          export GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          
          # إنشاء الإصدار الحافظ (Release) الخاص بالتنزيلات إذا لم يكن موجوداً من قبل
          gh release create "downloads" --title "Downloads Archive" --notes "Failsafe storage for downloader tool assets" --repo "${{ github.repository }}" 2>/dev/null || true
          
          # رفع الملف للمستودع وتجاوز أي ملف مكرر بنفس المعرف للتأكيد
          gh release upload "downloads" "$FILE" --clobber --repo "${{ github.repository }}"

          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/downloads/${FILE}"

          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          echo "JOB_OUT_STATUS=success" >> $GITHUB_ENV
          echo "✅ تم الرفع والتخزين بنجاح مطلق في جيت هاب! الرابط المباشر: $DOWNLOAD_URL"

      - name: Send Webhook
        if: always()
        run: |
          WEBHOOK_URL="${{ github.event.inputs.webhookUrl }}"
          WEBHOOK_ID="${{ github.event.inputs.webhookId }}"
          
          FINAL_STATUS="${{ env.JOB_OUT_STATUS }}"
          if [ -z "$FINAL_STATUS" ]; then
            FINAL_STATUS="${{ job.status }}"
          fi
          
          ERROR_MSG="${{ env.YT_ERROR }}"
          if [ -z "$ERROR_MSG" ] && [ "$FINAL_STATUS" == "failure" ]; then
            ERROR_MSG="فشل تنفيذ الخطوات في جيت هاب."
          fi
          
          # بناء الـ JSON بشكل فائق الأمان عبر jq لتجنب كسر الهيكل مهما كانت لغة ونوع محتوى الخطأ
          jq -n             --arg id "$WEBHOOK_ID"             --arg url "${{ env.DOWNLOAD_URL }}"             --arg status "$FINAL_STATUS"             --arg error "$ERROR_MSG"             '{id: $id, url: $url, status: $status, error: $error}' > webhook_payload.json
          
          echo "==== محتوى الويب هوك المرسل ===="
          cat webhook_payload.json
          
          curl -L --post301 --post302 --post303 -X POST -H "Content-Type: application/json"             -d @webhook_payload.json             "$WEBHOOK_URL"

          # إرسال حالة الالتزام (Commit Status) كبديل فائق الأمان لبيئات التطوير المغلقة (ais-dev)
          # نستخدم GITHUB_TOKEN المدمج والذي يملك صلاحية تعديل الحالات تلقائياً
          STATE_MAPPED="pending"
          if [ "$FINAL_STATUS" == "success" ]; then
            STATE_MAPPED="success"
          elif [ "$FINAL_STATUS" == "failure" ] || [ "$FINAL_STATUS" == "cancelled" ]; then
            STATE_MAPPED="failure"
          fi

          echo "==== إنشاء Commit Status البديل ===="
          jq -n             --arg desc "$ERROR_MSG"             --arg tgt "${{ env.DOWNLOAD_URL }}"             --arg state "$STATE_MAPPED"             --arg ctx "YTDL-Result-$WEBHOOK_ID"             '{state: $state, target_url: $tgt, description: $desc, context: $ctx}' > commit_status.json
          
          cat commit_status.json

          curl -s -X POST             -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"             -H "Accept: application/vnd.github+json"             -H "X-GitHub-Api-Version: 2022-11-28"             https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}             -d @commit_status.json
          
